name: Frontend
description: Frontend development task
title: "[Frontend]: "
labels: ["frontend"]

body:
  - type: textarea
    id: context
    attributes:
      label: Context / Goal
      description: What is this UI change or feature and why is it needed?
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: What needs to be done?
      description: Describe the UI changes, components, or behavior that need to be implemented.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Add checklist items using `- [ ]`
      value: |
        - [ ] UI matches design/spec and works as expected
        - [ ] No console errors or broken UI states
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: UX considerations, state handling, accessibility, performance, edge cases, or design constraints.
