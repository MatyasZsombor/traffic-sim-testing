name: General
description: General task
title: "[General]: "

body:
  - type: textarea
    id: context
    attributes:
      label: Context / Goal
      description: What is this task about and why is it needed?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Add checklist items using `- [ ]`
      value: |
        - [ ] Feature works as expected
        - [ ] Code is reviewed and approved
    validations:
      required: true

  - type: checkboxes
    id: components
    attributes:
      label: Components
      options:
        - label: Backend (C++)
        - label: Tauri
        - label: Frontend

