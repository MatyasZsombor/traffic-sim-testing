name: Build · Linux

on:
  pull_request:
  workflow_call:
    inputs:
      signed:
        description: "Build with updater plugin and signing enabled"
        type: boolean
        default: false
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: false
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build libclang-dev \
            libwebkit2gtk-4.1-dev build-essential \
            libxdo-dev libssl-dev libcairo2-dev libpango1.0-dev \
            libgtk-3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bridge
            app/src-tauri

      - uses: taiki-e/install-action@just

      - name: Build
        run: ${{ inputs.signed && 'just build-signed' || 'just build' }}

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/artifacts/
          retention-days: 7
